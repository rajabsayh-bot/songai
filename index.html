<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generat Musik Ai Pro</title>
<style>
:root{
--bg:#0f172a;
--card:#111827;
--input:#1e293b;
--primary:#3b82f6;
--primary2:#60a5fa;
--text:#fff;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
background:var(--bg);
color:var(--text);
padding-bottom:100px;
transition:.4s;
}
.header{
padding:30px 20px 80px;
background:linear-gradient(135deg,var(--primary),var(--primary2));
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
}
.content{
padding:20px;
margin-top:-40px;
}
.card{
background:var(--card);
padding:20px;
border-radius:25px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}
.title{
font-size:25px;
font-weight:bold;
margin-bottom:15px;
color:var(--primary2);
}
.label{
margin:15px 0 8px;
}
input,textarea,select{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:15px;
background:var(--input);
color:white;
}
textarea{
resize:none;
min-height:120px;
}
button{
border:none;
cursor:pointer;
font-weight:bold;
}
.generate,.save-btn,.credit-btn,.toggle-btn{
width:100%;
padding:15px;
border-radius:15px;
margin-top:10px;
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:white;
}
.row{
display:flex;
gap:10px;
}
.gender-btn,.theme-btn{
flex:1;
padding:14px;
border-radius:15px;
background:var(--input);
color:white;
}
.gender-btn.active{
background:var(--primary);
}
.credit-box{
background:var(--input);
padding:15px;
border-radius:15px;
margin-top:15px;
}
.key-text{
margin-top:10px;
word-break:break-all;
font-size:13px;
}
.hidden{
display:none;
}
.theme-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}
.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:var(--card);
display:flex;
justify-content:space-around;
padding:15px 0;
}
.nav-item{
text-align:center;
cursor:pointer;
}
.loading{
margin-top:15px;
font-weight:bold;
color:var(--primary2);
}
.song-card{
background:#020617;
padding:15px;
border-radius:20px;
margin-top:15px;
}
.song-card img{
width:100%;
border-radius:15px;
margin-bottom:10px;
}
.download{
display:block;
text-align:center;
background:var(--primary);
padding:12px;
border-radius:12px;
color:white;
text-decoration:none;
margin-top:10px;
}
audio{
width:100%;
margin-top:10px;
}
</style>
</head>
<body>

<div class="header">
<h1>🎵 Generat Musik Ai Pro</h1>
<p>SunoAPI Music Generator</p>
</div>

<div class="content">

<div id="homePage">

<div class="card">
<div class="title">Welcome 👋</div>
<p>
✅ Generate Music<br>
✅ Play Audio<br>
✅ Download MP3<br>
✅ Check Credits<br>
✅ Delete Key<br>
✅ 10 Themes<br>
✅ Auto Loading Status
</p>
</div>

</div>

<div id="generatePage" class="hidden">

<div class="card">

<div class="title">Generate Music</div>

<div class="label">Judul Lagu</div>
<input type="text" id="title">

<div class="label">Style Musik</div>
<textarea id="style"></textarea>

<div class="label">Lirik Lagu</div>
<textarea id="lyrics"></textarea>

<div class="label">Vocal</div>

<div class="row">

<button class="gender-btn"
id="maleBtn"
onclick="setGender('m')">
Male
</button>

<button class="gender-btn active"
id="femaleBtn"
onclick="setGender('f')">
Female
</button>

</div>

<div class="label">Model</div>

<select id="model">
<option value="V5_5">V5.5</option>
<option value="V5">V5</option>
<option value="V4">V4</option>
</select>

<button class="generate"
onclick="generateMusic()">
GENERATE MUSIC
</button>

<div class="loading"
id="loading"></div>

<div id="result"></div>

</div>

</div>

<div id="settingsPage" class="hidden">

<div class="card">

<div class="title">API Settings</div>

<textarea
id="apikeys"
placeholder="1 API key per baris"></textarea>

<button class="save-btn"
onclick="saveApiKeys()">
SAVE API KEYS
</button>

<div id="creditsBox"></div>

</div>

<div class="card">

<div class="title">Themes</div>

<div class="theme-grid">

<button class="theme-btn" onclick="setTheme(1)">Modern</button>
<button class="theme-btn" onclick="setTheme(2)">Beach</button>
<button class="theme-btn" onclick="setTheme(3)">Galaxy</button>
<button class="theme-btn" onclick="setTheme(4)">Cyber</button>
<button class="theme-btn" onclick="setTheme(5)">Neon</button>
<button class="theme-btn" onclick="setTheme(6)">Forest</button>
<button class="theme-btn" onclick="setTheme(7)">Sunset</button>
<button class="theme-btn" onclick="setTheme(8)">Candy</button>
<button class="theme-btn" onclick="setTheme(9)">Gold</button>
<button class="theme-btn" onclick="setTheme(10)">Ocean</button>

</div>

</div>

</div>

</div>

<div class="nav">

<div class="nav-item"
onclick="showPage('home')">
🏠<br>Home
</div>

<div class="nav-item"
onclick="showPage('generate')">
🎵<br>Generate
</div>

<div class="nav-item"
onclick="showPage('settings')">
⚙️<br>Settings
</div>

</div>

<script>

let vocalGender = 'f';

function setGender(type){

vocalGender = type;

maleBtn.classList.remove('active');
femaleBtn.classList.remove('active');

if(type === 'm'){
maleBtn.classList.add('active');
}else{
femaleBtn.classList.add('active');
}

}

function showPage(page){

homePage.classList.add('hidden');
generatePage.classList.add('hidden');
settingsPage.classList.add('hidden');

if(page === 'home'){
homePage.classList.remove('hidden');
}

if(page === 'generate'){
generatePage.classList.remove('hidden');
}

if(page === 'settings'){
settingsPage.classList.remove('hidden');
}

}

function hideKey(key){

return key.substring(0,4)
+ '********'
+ key.substring(key.length-4);

}

function saveApiKeys(){

const raw =
document.getElementById('apikeys').value;

const keys = raw
.split('\n')
.map(k => k.trim())
.filter(k => k);

localStorage.setItem(
'gmusic_keys',
JSON.stringify(keys)
);

alert('API Keys Saved');

renderKeys();

}

function renderKeys(){

const keys = JSON.parse(
localStorage.getItem('gmusic_keys')
) || [];

creditsBox.innerHTML = '';

keys.forEach((key,index)=>{

creditsBox.innerHTML += `

<div class="credit-box">

<b>API KEY ${index+1}</b>

<div class="key-text"
id="keyText${index}">
${hideKey(key)}
</div>

<button class="toggle-btn"
onclick="toggleKey(${index})">
👁 Show / Hide Key
</button>

<button class="credit-btn"
onclick="checkSingleCredit('${key}',${index})">
💳 Check Credits
</button>

<button class="toggle-btn"
onclick="deleteKey(${index})">
🗑 Delete Key
</button>

<div class="key-text"
id="creditResult${index}">
Credits Left : -
</div>

</div>

`;

});

}

function toggleKey(index){

const keys = JSON.parse(
localStorage.getItem('gmusic_keys')
) || [];

const text =
document.getElementById(
'keyText'+index
);

if(text.dataset.show === '1'){

text.innerHTML =
hideKey(keys[index]);

text.dataset.show = '0';

}else{

text.innerHTML = keys[index];

text.dataset.show = '1';

}

}

function deleteKey(index){

const keys = JSON.parse(
localStorage.getItem('gmusic_keys')
) || [];

keys.splice(index,1);

localStorage.setItem(
'gmusic_keys',
JSON.stringify(keys)
);

renderKeys();

}

async function checkSingleCredit(key,index){

const result =
document.getElementById(
'creditResult'+index
);

result.innerHTML =
'Checking Credits...';

try{

const response = await fetch(
'https://api.sunoapi.org/api/v1/generate/credit',
{
method:'GET',
headers:{
'Authorization':'Bearer ' + key
}
}
);

const data =
await response.json();

if(data.code === 200){

result.innerHTML =
'Credits Left : ' + data.data;

}else{

result.innerHTML =
'Failed : ' + data.msg;

}

}catch(err){

result.innerHTML =
'Error Checking Credits';

}

}

async function generateMusic(){

const keys = JSON.parse(
localStorage.getItem('gmusic_keys')
) || [];

const apiKey = keys[0];

if(!apiKey){

alert('Masukkan API Key');

showPage('settings');

return;

}

const songTitle =
document.getElementById('title').value;

const style =
document.getElementById('style').value;

const lyrics =
document.getElementById('lyrics').value;

const model =
document.getElementById('model').value;

document.getElementById('loading')
.innerHTML = 'Generating Music...';

document.getElementById('result')
.innerHTML = '';

try{

const response = await fetch(
'https://api.sunoapi.org/api/v1/generate',
{
method:'POST',
headers:{
'Content-Type':'application/json',
'Authorization':'Bearer ' + apiKey
},
body:JSON.stringify({

title:songTitle,
style:style,
prompt:lyrics,
customMode:true,
instrumental:false,
model:model,
vocalGender:vocalGender,
callBackUrl:"https://example.com/callback"

})
}
);

const data = await response.json();

console.log(data);

if(data.code !== 200){

loading.innerHTML =
'Failed : ' + data.msg;

return;

}

const taskId =
data.data.taskId;

loading.innerHTML =
'Processing Music...';

checkMusicResult(taskId,apiKey);

}catch(err){

console.log(err);

loading.innerHTML =
'Server Error';

}

}

async function checkMusicResult(taskId,apiKey){

let tryCount = 0;

const interval = setInterval(async()=>{

tryCount++;

if(tryCount > 60){

clearInterval(interval);

loading.innerHTML =
'Timeout Generate';

return;

}

try{

const response = await fetch(
'https://api.sunoapi.org/api/v1/generate/record-info?taskId=' + taskId,
{
method:'GET',
headers:{
'Authorization':'Bearer ' + apiKey
}
}
);

const data = await response.json();

console.log(data);

if(
data.code === 200 &&
data.data &&
data.data.status === 'SUCCESS'
){

clearInterval(interval);

loading.innerHTML =
'Music Complete ✅';

const songs =
data.data.response.sunoData;

let html = '';

songs.forEach(song=>{

html += `

<div class="song-card">

<img src="${song.imageUrl}">

<h3>${song.title}</h3>

<p>${song.tags || ''}</p>

<audio controls
src="${song.audioUrl}">
</audio>

<a class="download"
href="${song.audioUrl}"
download>

⬇ Download MP3

</a>

</div>

`;

});

document.getElementById('result')
.innerHTML = html;

}

}catch(err){

console.log(err);

}

},5000);

}

function setTheme(id){

const themes = {

1:['#0f172a','#111827','#1e293b','#3b82f6','#60a5fa'],
2:['#082f49','#0c4a6e','#075985','#f59e0b','#38bdf8'],
3:['#1e1b4b','#312e81','#4338ca','#7c3aed','#c084fc'],
4:['#030712','#111827','#1f2937','#06b6d4','#22d3ee'],
5:['#0a0a0a','#1a1a1a','#262626','#ff00ff','#00ffff'],
6:['#052e16','#14532d','#166534','#22c55e','#4ade80'],
7:['#431407','#7c2d12','#9a3412','#fb923c','#fdba74'],
8:['#4c1d95','#6d28d9','#7c3aed','#ec4899','#f9a8d4'],
9:['#3f2f00','#5c4500','#7a5c00','#facc15','#fde68a'],
10:['#082f49','#0f172a','#1e3a8a','#0ea5e9','#7dd3fc']

};

const t = themes[id];

document.documentElement
.style.setProperty('--bg',t[0]);

document.documentElement
.style.setProperty('--card',t[1]);

document.documentElement
.style.setProperty('--input',t[2]);

document.documentElement
.style.setProperty('--primary',t[3]);

document.documentElement
.style.setProperty('--primary2',t[4]);

}

renderKeys();

</script>

</body>
</html>
